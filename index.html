<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Analyzer Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:900px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(118,75,162,0.3);
animation:fadeIn 1s ease;
}

h1{
text-align:center;
margin-bottom:10px;
background:linear-gradient(90deg,#a18cd1,#00f2fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border-radius:10px;
border:none;
outline:none;
margin-top:10px;
background:rgba(255,255,255,0.1);
color:#fff;
transition:.3s;
}

input:focus{
box-shadow:0 0 10px #a18cd1;
transform:scale(1.02);
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(118,75,162,0.5);
}

.result{
margin-top:20px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.05);
animation:slideUp .6s ease;
}

.bar{
height:10px;
border-radius:10px;
background:#333;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
width:0;
transition:.6s ease;
border-radius:10px;
}

.weak{background:linear-gradient(90deg,#ff4d4d,#ff6f91)}
.fair{background:linear-gradient(90deg,#f9a826,#ffd166)}
.good{background:linear-gradient(90deg,#06d6a0,#1dd1a1)}
.strong{background:linear-gradient(90deg,#00c6ff,#0072ff)}

.check{
margin-top:10px;
padding:8px;
border-radius:8px;
background:rgba(255,255,255,0.08);
animation:fadeIn .5s ease;
}

.suggestion{
margin-top:10px;
padding:10px;
border-radius:10px;
background:rgba(0,198,255,0.15);
font-size:14px;
}

.toggle{
position:absolute;
top:20px;
right:20px;
cursor:pointer;
padding:8px 12px;
border-radius:8px;
background:rgba(255,255,255,0.1);
}

.light{
background:#f5f5f5;
color:#111;
}

.light .container{
background:#fff;
color:#111;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideUp{
from{transform:translateY(20px);opacity:0}
to{transform:translateY(0);opacity:1}
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙</div>

<div class="container">
<h1>🔐 Password Analyzer</h1>
<p class="subtitle">Live strength + smart suggestions</p>

<input type="password" id="pass" placeholder="Enter password..." oninput="analyze()">
<button onclick="generate()">Generate Strong Password</button>

<div id="output"></div>
</div>

<script>
function analyze(){
let p=document.getElementById('pass').value;
if(!p){document.getElementById('output').innerHTML="";return;}

let score=0;
if(p.length>=12)score+=30;
if(/[A-Z]/.test(p))score+=20;
if(/[0-9]/.test(p))score+=20;
if(/[^A-Za-z0-9]/.test(p))score+=30;

let level="weak";
if(score>=80)level="strong";
else if(score>=60)level="good";
else if(score>=40)level="fair";

let suggestion="";
if(score<80){
suggestion="💡 Add uppercase, numbers & symbols to improve strength";
}

let html=`
<div class="result">
<h3>Strength: ${level.toUpperCase()} (${score}%)</h3>
<div class="bar"><div class="fill ${level}" style="width:${score}%"></div></div>

<div class="check">${p.length>=12?"✅":"❌"} Length ≥ 12</div>
<div class="check">${/[A-Z]/.test(p)?"✅":"❌"} Uppercase</div>
<div class="check">${/[0-9]/.test(p)?"✅":"❌"} Number</div>
<div class="check">${/[^A-Za-z0-9]/.test(p)?"✅":"❌"} Special char</div>

${suggestion?`<div class="suggestion">${suggestion}</div>`:""}
</div>`;

document.getElementById('output').innerHTML=html;
}

function generate(){
let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
let pass="";
for(let i=0;i<14;i++){
pass+=chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById('pass').value=pass;
analyze();
}

function toggleMode(){
document.body.classList.toggle('light');
}
</script>

</body>
</html>
