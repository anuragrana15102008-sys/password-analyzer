<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anurag Rana | Cybersecurity Reviews</title>
    <style>
        /* FULL CSS - NO EXTERNAL LINKS NEEDED */
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --bg: #0f172a;
        }

        body {
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .intern-tag {
            color: var(--primary);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 30px;
            display: block;
        }

        .rating-row {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 5px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: #cbd5e1;
        }

        .btn:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
        }

        .btn.active {
            background: var(--primary);
            color: #0f172a;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .submit {
            background: var(--primary);
            color: #0f172a;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit:hover { scale: 1.02; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Anurag Rana</h1>
        <span class="intern-tag">🛡️ Cybersecurity Intern @ Thiranex</span>
        
        <p>Rate my Password Analyzer:</p>

        <div class="rating-row">
            <button class="btn" onclick="select(this, 'Good')">🔥 Good</button>
            <button class="btn" onclick="select(this, 'Medium')">⚖️ Medium</button>
            <button class="btn" onclick="select(this, 'Bad')">⚠️ Bad</button>
        </div>

        <textarea id="msg" rows="3" placeholder="Leave a note..."></textarea>

        <button class="submit" onclick="done()">Submit Review</button>
    </div>

    <script>
        let score = "";
        function select(el, val) {
            score = val;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function done() {
            if(!score) return alert("Select a rating first!");
            alert("Thanks! Anurag Rana has received your feedback.");
            location.reload();
        }
    </script>
</body>
</html>
